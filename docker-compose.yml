version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sipscan_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sipscan

  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    container_name: sipscan_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-8000}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    ports:
      - "8000:8000"
    networks:
      - sipscan

volumes:
  pgdata:

networks:
  sipscan:
    driver: bridge
