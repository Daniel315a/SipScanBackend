name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set coverage threshold
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "COVERAGE_THRESHOLD=90" >> $GITHUB_ENV
          else
            echo "COVERAGE_THRESHOLD=60" >> $GITHUB_ENV
          fi

      - name: Run tests
        run: pytest --cov-fail-under=$COVERAGE_THRESHOLD --ignore=tests/test_auth_service.py --ignore=tests/test_receipt_service_cuentas_csv.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"
